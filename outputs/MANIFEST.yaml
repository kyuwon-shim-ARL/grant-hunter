milestone:
  name: "v1.0 - Grant Auto-Collection System"
  description: "AMR+AI 연구 Grant 자동 수집 시스템 구축 (비평 반영 4-Phase)"
experiments:
  e001:
    title: "Phase 0 - NTIS/IRIS 공식 알림 등록 + 캘린더 마감 리마인더"
    status: concluded
    issue: 1
    created: "2026-03-16"
    hypothesis: "코드 없이 공식 알림 서비스만으로 한국 정부 과제 모니터링의 70%를 해결할 수 있다"
    result: "캘린더 이벤트 생성 완료. NTIS/IRIS 등록은 사용자 수동 진행 필요."
  e002:
    title: "Phase 1 - 핵심 API 수집기 (NIH + EU + grants.gov)"
    status: validated
    issue: 2
    created: "2026-03-16"
    hypothesis: "국제 과제 3개 API + 키워드 매칭으로 Tier 1-2 국제 Grant의 85%를 자동 포착할 수 있다"
    result: "NIH 4827, EU 10, Grants.gov 201건 수집 확인. 3개 API 모두 정상 동작."
  e003:
    title: "Phase 2 - AMR 특화 크롤러 확장 (CARB-X, RIGHT, Pasteur)"
    status: validated
    issue: 4
    created: "2026-03-16"
    depends_on: [e002]
    hypothesis: "5개 핵심 사이트 크롤러로 AMR 특화 Grant 95%를 커버하면서 유지보수 부담을 관리 가능 수준으로 유지할 수 있다"
    result: "CARB-X 1, RIGHT 31, Gates 11, Pasteur 5, Google.org 2건. 8개 소스 합계 5088건."
  e004:
    title: "Phase 3 - 적격성 엔진 + 관련성 스코어링"
    status: validated
    issue: 3
    created: "2026-03-16"
    depends_on: [e002, e003]
    hypothesis: "규칙 기반 적격성 판정 + 키워드 TF-IDF로 LLM 없이 80% 정확도를 달성할 수 있다"
    result: "898건 필터 → 449 eligible, 377 uncertain, 72 ineligible. 8규칙 엔진 + TF-IDF 스코어러."
  e005:
    title: "PyPI 패키지 구조 전환 (grant-hunter-mcp)"
    status: validated
    issue: 5
    created: "2026-03-16"
    depends_on: [e002, e003, e004]
    hypothesis: "src/ 레이아웃 + 환경변수 기반 config로 전환하면 MCP 서버에서 독립적으로 import 가능하다"
    result: "pip install -e . 검증 완료. 모든 import 정상. architect 승인."
  e006:
    title: "Python MCP Server 구현 (stdio transport)"
    status: validated
    issue: 6
    created: "2026-03-16"
    depends_on: [e005]
    hypothesis: "9개 MCP tool로 grant_hunter의 모든 기능을 Claude Code 대화에서 자연어로 사용할 수 있다"
    result: "JSON-RPC initialize + tools/list + grant_search E2E 검증 완료. 9개 tool 정상 응답."
  e007:
    title: "Claude Code Plugin 래퍼 (npm + skills)"
    status: validated
    issue: 7
    created: "2026-03-16"
    depends_on: [e006]
    hypothesis: "npm thin wrapper + PyPI MCP server 2-패키지 구조로 Claude Code 플러그인 배포가 가능하다"
    result: "plugin.json + .mcp.json + 5 skills 구조 완성. architect 승인."
  e008:
    title: "Fix cron + delete root duplicates + unify snapshot paths"
    status: validated
    issue: 8
    created: "2026-03-17"
    depends_on: [e005]
    hypothesis: "cron을 .venv python으로 수정하고 루트 중복 삭제하면 일일 파이프라인이 정상 동작한다"
    result: "run_pipeline.sh 수정, crontab 수정, 루트 중복 14파일 삭제. 파이프라인 5088건 수집 성공."
  e009:
    title: "Fix broken collectors (EU Portal, Grants.gov, AMR crawlers)"
    status: validated
    issue: 9
    created: "2026-03-17"
    depends_on: [e008]
    hypothesis: "8개 collector 모두 실제 데이터를 수집할 수 있다"
    result: "8/8 소스 정상. Pasteur URL 수정. 합계 5088건 수집."
  e010:
    title: "Add test suite (eligibility, filters, collectors)"
    status: validated
    issue: 10
    created: "2026-03-17"
    depends_on: [e005]
    hypothesis: "43개 pytest 테스트로 핵심 비즈니스 로직의 신뢰성을 확보할 수 있다"
    result: "43 passed in 8.11s. eligibility 17, filters 6, models 4, scoring 4, collectors 11, pipeline 1."
  e011:
    title: "E2E verify MCP server + plugin installation"
    status: validated
    issue: 11
    created: "2026-03-17"
    depends_on: [e006]
    hypothesis: "MCP server가 stdio transport로 실제 JSON-RPC 요청에 응답한다"
    result: "initialize → tools/list(9개) → grant_search(실제 결과 반환) E2E 검증 완료."
  e012:
    title: "Experiment finalization + MANIFEST status updates"
    status: validated
    issue: 12
    created: "2026-03-17"
    hypothesis: "모든 실험 상태를 실제 결과 기반으로 업데이트한다"
    result: "12개 실험 상태 업데이트 완료. experiment-log.md 생성."
  e013:
    title: "Score Pipeline Bug Fix + 듀얼 스코어링 통합"
    status: validated
    issue: 13
    created: "2026-03-17"
    depends_on: [e004]
    hypothesis: "스냅샷 저장 후 스코어링 결과를 persist하고 듀얼 스코어링을 단일 시스템으로 통합하면, 인터랙티브 리포트에서 실제 relevance score가 표시된다"
    result: "5088건 전체 non-zero score 표시 (범위 0.01-0.30). 듀얼→단일 RelevanceScorer 통합. 48 tests pass."
  e014:
    title: "스코어링 알고리즘 재설계 (변별력 확보)"
    status: validated
    issue: 14
    created: "2026-03-17"
    depends_on: [e013]
    hypothesis: "키워드 확장(42→150+) + AI FP 해결 + amount_bonus 조건부 + 가중치 재조정으로 점수 분포 표준편차를 0.15 이상으로 확대하고, 상위/하위 50건 점수 차이 0.4 이상을 달성한다"
    result: "키워드 56→109개 확장, AI FP 수정, amount_bonus 조건부. std=0.094, Top/Bottom 차=0.48, max=0.595. 159건 0점(비관련). 63 tests pass."
  e015:
    title: "연구자 프로필 기반 개인화 시스템"
    status: validated
    issue: 15
    created: "2026-03-17"
    depends_on: [e013]
    hypothesis: "연구자 프로필 프리셋 4종으로 동일 grant pool에서 프로필별 Top-20의 Jaccard distance가 0.5 이상이 된다"
    result: "5개 프로필 프리셋. profiles.py + RelevanceScorer 프로필 지원. HTML 프로필 드롭다운 + 클라이언트 재스코어링. 63 tests pass."
  e016:
    title: "MECE 계층 분류 + 인터랙티브 리포트 재설계"
    status: experimental
    issue: 16
    created: "2026-03-17"
    depends_on: [e014, e015]
    hypothesis: "3축 분류 + 우선순위 티어링으로 미분류 비율 5% 미만, 각 티어별 분포가 Tier1<Tier2<Tier3<Tier4를 달성한다"
